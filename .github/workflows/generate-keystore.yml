name: Generate Keystore (Run Once)

# Manually triggered — run this once, copy the outputs, add them as GitHub Secrets,
# then delete this workflow file.
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate JKS Keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore release.jks \
            -storetype JKS \
            -alias financeapp \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass Finance@123 \
            -keypass Finance@123 \
            -dname "CN=Finance App, OU=Android, O=FinanceApp, L=City, ST=State, C=IN"

          echo ""
          echo "========================================="
          echo "Copy the value below → GitHub Secret: KEYSTORE_BASE64"
          echo "========================================="
          base64 -w 0 release.jks
          echo ""
          echo ""
          echo "========================================="
          echo "Other secret values to add in GitHub:"
          echo "  KEYSTORE_PASSWORD = Finance@123"
          echo "  KEY_ALIAS         = financeapp"
          echo "  KEY_PASSWORD      = Finance@123"
          echo "========================================="
