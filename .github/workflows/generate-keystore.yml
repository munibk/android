name: Generate Keystore (Run Once)

# Manually triggered — run this once after adding GH_PAT secret.
# It will auto-create all 4 signing secrets and trigger a release build.
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate JKS Keystore and set GitHub Secrets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Generate the keystore
          keytool -genkeypair \
            -v \
            -keystore release.jks \
            -storetype JKS \
            -alias financeapp \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "Finance@123" \
            -keypass "Finance@123" \
            -dname "CN=Finance App, OU=Android, O=FinanceApp, L=City, ST=State, C=IN"

          # Encode as base64
          KEYSTORE_B64=$(base64 -w 0 release.jks)

          # Try to set secrets automatically if GH_PAT is available
          if [ -n "$GH_TOKEN" ]; then
            echo "$KEYSTORE_B64"  | gh secret set KEYSTORE_BASE64   --repo ${{ github.repository }}
            echo "Finance@123"    | gh secret set KEYSTORE_PASSWORD  --repo ${{ github.repository }}
            echo "financeapp"     | gh secret set KEY_ALIAS          --repo ${{ github.repository }}
            echo "Finance@123"    | gh secret set KEY_PASSWORD       --repo ${{ github.repository }}
            echo "✅ All 4 secrets set automatically."
          else
            echo "⚠️  GH_PAT not set — copy the values below manually into GitHub Secrets:"
          fi

          echo ""
          echo "================================================"
          echo "KEYSTORE_BASE64  →  (value below)"
          echo "$KEYSTORE_B64"
          echo "================================================"
          echo "KEYSTORE_PASSWORD → Finance@123"
          echo "KEY_ALIAS         → financeapp"
          echo "KEY_PASSWORD      → Finance@123"
          echo "================================================"

      - name: Trigger Release Build
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run build.yml --repo ${{ github.repository }} --ref main
          echo "✅ Build APK workflow triggered."
