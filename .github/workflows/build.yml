name: Build APK

# Triggers on every push to main and on pull requests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17 (required for modern Android builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Set up Gradle (installs Gradle 8.4 and generates wrapper if missing)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # Step 4: Cache Gradle & Android SDK downloads to speed up future builds
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # Step 5: Accept Android SDK licenses non-interactively
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # Step 6: Generate Gradle wrapper if not present
      - name: Generate Gradle wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.4
          fi
          chmod +x ./gradlew

      # Step 7: Build the debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # Step 8: Run unit tests
      - name: Run Unit Tests
        run: ./gradlew test --stacktrace

      # Step 9: Upload APK artifact (downloadable under Actions tab)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-tracker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # Step 10: Upload unit test results
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/
          retention-days: 7
