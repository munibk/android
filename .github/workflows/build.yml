name: Build APK

# Triggers on every push to main and on pull requests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17 (required for modern Android builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Set up Gradle (installs Gradle 8.4 and generates wrapper if missing)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # Step 4: Cache Gradle & Android SDK downloads to speed up future builds
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # Step 5: Accept Android SDK licenses non-interactively
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # Step 6: Generate Gradle wrapper if not present
      - name: Generate Gradle wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.4
          fi
          chmod +x ./gradlew

      # Step 7: Decode keystore and convert to JKS format (Android-compatible)
      - name: Decode Keystore
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore/release-src.p12
          keytool -importkeystore \
            -srckeystore app/keystore/release-src.p12 \
            -destkeystore app/keystore/release.jks \
            -deststoretype JKS \
            -srcalias "${{ secrets.KEY_ALIAS }}" \
            -destalias "${{ secrets.KEY_ALIAS }}" \
            -srcstorepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -deststorepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -srckeypass "${{ secrets.KEY_PASSWORD }}" \
            -destkeypass "${{ secrets.KEY_PASSWORD }}" \
            -noprompt
          rm -f app/keystore/release-src.p12

      # Step 8: Build the signed release APK
      - name: Build Release APK
        env:
          KEYSTORE_PATH: keystore/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # Step 9: Run unit tests
      - name: Run Unit Tests
        run: ./gradlew test --stacktrace

      # Step 10: Upload APK artifact (downloadable under Actions tab)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-tracker-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      # Step 11: Upload unit test results
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/
          retention-days: 7
